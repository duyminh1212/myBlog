{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotteria | Nhượng Quyền</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(180deg, #ffffff 15%, #ff0000 100%);
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .navbar {
            background-color: white !important;
            padding-bottom: 0;
        }

        .nav-link-custom {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            font-size: 14px;
            padding: 10px 20px;
            display: inline-block;
        }

        .container-custom {
            max-width: 85%;
            margin: 0 auto;
        }

        .btn-bag {
            background-color: #ff0015;
            color: white;
            font-weight: bold;
            border: none;
        }
        .btn-bag:hover {
            background-color: #d60012;
            color: white;
        }

        .brand-intro-title {
            font-weight: 900;
            font-size: 2.5rem;
            color: #000;
            margin-bottom: 30px;
        }

        .hotline-container {
            display: inline-flex;
            align-items: center;
            border: 3px solid #ff0015;
            border-radius: 50px;
            padding: 5px 25px;
            position: relative;
            background-color: white;
            margin-top: 15px;
        }

        .hotline-label {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background-color: white;
            color: #ff0015;
            font-weight: bold;
            font-size: 11px;
            padding: 0 10px;
            white-space: nowrap;
        }

        .hotline-number {
            color: #ff0015;
            font-weight: 900;
            font-size: 2rem;
            text-decoration: none;
        }

        .phone-icon-circle {
            background-color: #ff0015;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-right: 15px;
        }

        .form-franchise {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid #f0f0f0;
        }

        .form-franchise .form-control, .form-franchise .form-select {
            border: 1px solid #ff6b76;
            border-radius: 10px;
            padding: 10px 15px;
        }

        .form-franchise .form-control::placeholder {
            color: #b0b0b0;
        }

        .btn-submit-franchise {
            background-color: #ff5263;
            color: white;
            font-weight: bold;
            border: none;
            padding: 12px 40px;
            border-radius: 10px;
            transition: background-color 0.2s;
        }

        .btn-submit-franchise:hover {
            background-color: #ff3348;
        }

        .lang-select {
            font-size: 12px;
            font-weight: bold;
            color: #666;
            text-decoration: none;
        }
        .lang-select.active {
            color: #ff0015;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg shadow-sm mb-5">
        <div class="container-custom d-flex align-items-center justify-content-between w-100">
            <a href="/" class="navbar-brand fw-bold text-danger me-4">LOTTERIA</a>
            <div class="d-flex me-auto">
                <a href="/register/" class="nav-link-custom">ĐẶT HÀNG</a>
                <a href="#" class="nav-link-custom text-danger">NHƯỢNG QUYỀN</a>
                <a href="/lotteria/" class="nav-link-custom">CỬA HÀNG</a>
                <a href="/about/" class="nav-link-custom">VỀ LOTTERIA</a>
            </div>
            
            <div class="d-flex align-items-center gap-3">
                <div class="me-2">
                    <a href="#" class="lang-select active">VN</a> | 
                    <a href="#" class="lang-select">EN</a>
                </div>

                <button class="btn btn-bag px-4 py-2 rounded-pill shadow-sm d-flex align-items-center gap-2">
                    <i class="bi bi-bag-fill"></i> BAG 
                    <span id="bag-count" class="badge bg-white text-danger rounded-circle">0</span>
                </button>

                <a href="/login/" class="btn btn-outline-danger fw-bold px-4 py-2 rounded-pill shadow-sm" style="font-size: 14px; background-color: white;">
                    ĐĂNG NHẬP
                </a>
            </div>
        </div>
    </nav>

</div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold text-secondary">Lời nhắn</label>
                            <textarea class="form-control" rows="3" placeholder="Để lại lời nhắn của bạn tại đây"></textarea>

                        <div class="text-center">
